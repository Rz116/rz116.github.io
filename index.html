<!DOCTYPE html>
<html>
    <head> 
        <title>Quiz Game</title>
        <script src = "script.js"></script>
        <link rel = "stylesheet" href = "customize.css"></head>
    </head>

    <body>
        
        <div id = "Question1">
            <h1>QUIZ ON MANY THINGS</h1>
            <label>1.What is the largest Animal in the world? </label><br><br>
            <button type = "button" id = "BlueWhale">Blue Whale</button><br><br>
            <button type = "button" id = "Lion">African Lion</button><br><br>
            <button type = "button" id = "African">African Man</button><br><br>
            <button type = "button" id = "American">Donald trump</button><br><br>
        </div>
        <div id = "Question2">
            <h1>QUIZ ON MANY THINGS</h1>
            <label>2.What are the solutions to x^2 - 5x + 6 = 0?</label><br>
            <input id = "Solution1"></input>
            <input id = "Solution2"></input><br>
            <button type = "button" id = "SolutionInput">SUBMIT</button>
        </div>
        <div id = "Question3">
            <h1>QUIZ ON MANY THINGS</h1>
            <label>3.Who is the President of China?</label><br><br>
            <button type = "button" id = "Trump">Trump</button><br><br>
            <button type = "button" id = "Mao">Mao Ze Dong</button><br><br>
            <button type = "button" id = "Xijingping">Xi Jing Ping</button><br><br>
            <button type = "button" id = "DengXiaoPing">A Chinese man</button><br><br>
        </div>
        <div id = "Question4">
            <h1>QUIZ ON MANY THINGS</h1>
            <label>4. What is one Solution to the equation x^2 - 6x + 8?</label><br>
            <input id = "solution"></input><br> 
            <button type = "button" id = "Input">SUBMIT</button>
        </div>
        <div id = "Question5">
            <h1>QUIZ ON MANY THINGS</h1>
            <label>5. What is the y-interecept of y = 3x + 10</label><br><br>
            <button type = "button" id = "Answer1">(0,10)</button><br><br>
            <button type = "button" id = "Answer2">(0,3)</button><br><br>
            <button type = "button" id = "Answer3">(1,4)</button><br><br>
            <button type = "button" id = "Answer4">(10,0)</button><br><br>
        </div>
        <div id = "Answers">
            <h1>Answers</h1>
            <ol id = "answer">
                <li>Blue Whale</li>
                <li>2 and 3</li>
                <li>Xi Jing Ping</li>
                <li>2 OR 4</li>
                <li>(0,10)</li>
            </ol>
            <ol id = "Correct/Wrong"></ol>
            <label id = "label">Percentage Correct: </label>
            <label id = "percentage"></label>
        </div>
    </body>


</html>
